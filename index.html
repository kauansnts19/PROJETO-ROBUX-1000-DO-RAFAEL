<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>É O Seguinte!!!!</title>

<style>
body {
  margin: 0;
  font-family: "Courier New", monospace;
  color: #eee;

  /* 🖼 IMAGEM FICTÍCIA DE FUNDO */
  background: url("https://picsum.photos/1920/1080?grayscale&blur=2")
  no-repeat center center fixed;
  background-size: cover;

  overflow: hidden;
}

/* 🌑 ESCURECIMENTO TERROR */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  pointer-events: none;
}

/* 📺 ESTÁTICA DE TV */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;

  background: url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
  opacity: 0.07;
  mix-blend-mode: overlay;
}

/* 📡 SCANLINES (TV ANTIGA) */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;

  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(0,0,0,0.03) 2px,
    transparent 3px,
    transparent 4px
  );

  animation: scan 0.2s linear infinite;
}

@keyframes scan {
  0% { transform: translateY(0); }
  100% { transform: translateY(4px); }
}

/* 💀 TREMER LEVE */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  animation: shake 6s infinite;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  20% { transform: translate(1px,-1px); }
  40% { transform: translate(-1px,1px); }
  60% { transform: translate(1px,1px); }
  80% { transform: translate(-1px,-1px); }
  100% { transform: translate(0,0); }
}

/* 🔴 TÍTULO TERROR */
h1 {
  font-size: 52px;
  color: crimson;
  text-shadow: 0 0 20px darkred;
  animation: flicker 1.5s infinite;
}

@keyframes flicker {
  0%,100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* 📜 MENU */
ul {
  list-style: none;
  padding: 0;
}

li button {
  width: 260px;
  margin: 10px;
  padding: 12px;
  font-size: 18px;
  background: #111;
  border: 2px solid crimson;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

li button:hover {
  background: crimson;
  color: black;
  transform: scale(1.1);
  box-shadow: 0 0 15px crimson;
}

/* 🧠 TELAS */
.screen {
  display: none;
  max-width: 600px;
  margin-top: 20px;
}

.active {
  display: block;
}

.back {
  margin-top: 20px;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid #666;
  color: white;
  cursor: pointer;
}

.back:hover {
  border-color: crimson;
  color: crimson;
}
</style>
</head>

<body>

<div class="scanlines"></div>

<div class="container">

<h1>É O Seguinte!!!!</h1>

<ul>
  <li><button onclick="startGame()">▶ INICIAR</button></li>
  <li><button onclick="show('settings')">⚙ CONFIGURAÇÕES</button></li>
  <li><button onclick="show('credits')">☠ CRÉDITOS</button></li>
</ul>

<div id="settings" class="screen">
  <h2>Configurações</h2>
  <p>Volume: ██████░░░░</p>
  <p>Brilho: ████░░░░░░</p>
  <button class="back" onclick="back()">Voltar</button>
</div>

<div id="credits" class="screen">
  <h2>Créditos</h2>
  <p>Você não deveria estar vendo isso...</p>
  <button class="back" onclick="back()">Voltar</button>
</div>

</div>

<script>
function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function back(){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
}

function startGame(){
  document.body.style.filter = "contrast(2) brightness(0.5)";

  setTimeout(() => {
    alert("Ele está olhando para você agora...");
  }, 600);
}
</script>

</body>
</html>
