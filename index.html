<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loja de Robux</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#111827;
      color:white;
    }

    header{
      background:#7c3aed;
      padding:20px;
      text-align:center;
    }

    header h1{
      font-size:40px;
    }

    .hero{
      text-align:center;
      padding:60px 20px;
    }

    .hero h2{
      font-size:36px;
      margin-bottom:15px;
    }

    .hero p{
      color:#d1d5db;
      margin-bottom:30px;
    }

    .btn{
      background:#22c55e;
      color:white;
      padding:15px 30px;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#16a34a;
    }

    .cards{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      padding:40px 20px;
    }

    .card{
      background:#1f2937;
      width:250px;
      padding:25px;
      border-radius:15px;
      text-align:center;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card h3{
      font-size:28px;
      margin-bottom:10px;
      color:#a78bfa;
    }

    .price{
      font-size:32px;
      margin:15px 0;
      color:#22c55e;
    }

    footer{
      text-align:center;
      padding:20px;
      background:#0f172a;
      color:#9ca3af;
      margin-top:40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>LOJA DE ROBUX</h1>
  </header>

  <section class="hero">
    <h2>Compre Robux Rápido e Seguro</h2>
    <p>Entrega instantânea • Melhores preços • Suporte 24h</p>

    <button class="btn">Comprar Agora</button>
  </section>

  <section class="cards">

    <div class="card">
      <h3>400 Robux</h3>
      <p class="price">R$ 9,90</p>
      <button class="btn">Comprar</button>
    </div>

    <div class="card">
      <h3>800 Robux</h3>
      <p class="price">R$ 18,90</p>
      <button class="btn">Comprar</button>
    </div>

    <div class="card">
      <h3>1700 Robux</h3>
      <p class="price">R$ 34,90</p>
      <button class="btn">Comprar</button>
    </div>

  </section>

  <footer>
    © 2026 Loja de Robux - Todos os direitos reservados
  </footer>

</body>
</html>
